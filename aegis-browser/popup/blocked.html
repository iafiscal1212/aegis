<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AEGIS — Page Blocked</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }

    .card {
      background: #1e293b;
      border-radius: 16px;
      max-width: 520px;
      width: 100%;
      overflow: hidden;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
    }

    .card-header {
      background: linear-gradient(135deg, #991b1b, #dc2626);
      padding: 32px;
      text-align: center;
    }

    .shield {
      margin-bottom: 16px;
    }

    .card-header h1 {
      font-size: 24px;
      font-weight: 800;
      margin-bottom: 4px;
    }

    .card-header p {
      opacity: 0.85;
      font-size: 14px;
    }

    .card-body {
      padding: 28px 32px;
    }

    .reason-box {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.3);
      border-radius: 8px;
      padding: 16px;
      margin-bottom: 20px;
    }

    .reason-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #94a3b8;
      margin-bottom: 6px;
      font-weight: 600;
    }

    .reason-text {
      font-size: 15px;
      color: #fca5a5;
      font-weight: 500;
    }

    .url-box {
      background: rgba(255, 255, 255, 0.05);
      border-radius: 8px;
      padding: 12px 16px;
      margin-bottom: 24px;
      word-break: break-all;
      font-size: 13px;
      color: #94a3b8;
      font-family: "SF Mono", Monaco, "Cascadia Code", monospace;
    }

    .info-text {
      font-size: 14px;
      color: #94a3b8;
      line-height: 1.6;
      margin-bottom: 24px;
    }

    .actions {
      display: flex;
      gap: 12px;
    }

    .btn {
      flex: 1;
      padding: 12px 20px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      text-align: center;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
    }

    .btn-primary {
      background: #2563eb;
      color: white;
    }

    .btn-primary:hover {
      background: #1d4ed8;
    }

    .btn-secondary {
      background: rgba(255, 255, 255, 0.1);
      color: #cbd5e1;
    }

    .btn-secondary:hover {
      background: rgba(255, 255, 255, 0.15);
    }

    .footer {
      text-align: center;
      padding: 16px 32px;
      border-top: 1px solid rgba(255, 255, 255, 0.05);
      font-size: 12px;
      color: #475569;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="card-header">
      <div class="shield">
        <svg width="64" height="64" viewBox="0 0 48 48" fill="none">
          <path d="M24 4L6 12v12c0 11.1 7.7 21.5 18 24 10.3-2.5 18-12.9 18-24V12L24 4z" fill="rgba(255,255,255,0.2)"/>
          <path d="M18 18l12 12M30 18L18 30" stroke="white" stroke-width="3" stroke-linecap="round"/>
        </svg>
      </div>
      <h1>Page Blocked</h1>
      <p>AEGIS has prevented access to this page</p>
    </div>
    <div class="card-body">
      <div class="reason-box">
        <div class="reason-label">Reason</div>
        <div class="reason-text" id="reason">Loading...</div>
      </div>
      <div class="url-box" id="blocked-url">—</div>
      <p class="info-text">
        This page was blocked because it matched a known threat pattern in the AEGIS database.
        If you believe this is a mistake, you can report it or proceed at your own risk.
      </p>
      <div class="actions">
        <button class="btn btn-primary" id="btn-back">Go Back</button>
        <button class="btn btn-secondary" id="btn-proceed">Proceed Anyway</button>
      </div>
    </div>
    <div class="footer">
      AEGIS Browser Guardian &mdash; Protecting your browsing
    </div>
  </div>

  <script>
    // Parse URL params
    const params = new URLSearchParams(window.location.search);
    const reason = params.get("reason") || "Unknown threat";
    const blockedUrl = params.get("url") || "";

    document.getElementById("reason").textContent = reason;
    document.getElementById("blocked-url").textContent = blockedUrl || "Unknown URL";

    document.getElementById("btn-back").addEventListener("click", () => {
      if (window.history.length > 1) {
        window.history.go(-2); // Go back past the blocked page redirect
      } else {
        window.location.href = "about:blank";
      }
    });

    document.getElementById("btn-proceed").addEventListener("click", () => {
      if (blockedUrl) {
        // Temporarily allow this URL by opening directly
        // The user acknowledged the risk
        window.location.href = blockedUrl;
      }
    });
  </script>
</body>
</html>
