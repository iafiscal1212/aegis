name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  rust:
    name: Rust Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace
      - run: cargo clippy --workspace -- -D warnings
      - run: cargo fmt --check

  python:
    name: Python Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install maturin and build
        run: |
          pip install maturin
          maturin develop
      - name: Install dev dependencies
        run: pip install -e ".[dev]"
      - name: Lint
        run: ruff check python/ tests/
      - name: Test
        run: pytest --cov=aegis tests/python/ -m "not ebpf"

  pure-python:
    name: Pure Python (no Rust)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install without Rust
        run: |
          pip install click>=8.1 rich>=13.0 httpx>=0.27 pyyaml>=6.0
          pip install pytest>=8.0 pytest-cov>=5.0
          pip install -e "." --no-build-isolation 2>/dev/null || true
          export PYTHONPATH="${PYTHONPATH}:$(pwd)/python"
      - name: Test pure Python fallbacks
        env:
          PYTHONPATH: python
        run: pytest tests/python/ -k "not rust" -m "not ebpf"

  aegisd:
    name: Build aegisd (C++ daemon)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install C++ dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake g++ pkg-config \
            libyaml-cpp-dev libsqlite3-dev libcurl4-openssl-dev
      - name: Build aegisd (without eBPF)
        run: |
          cd native
          mkdir build && cd build
          cmake .. -DAEGIS_ENABLE_BPF=OFF -DAEGIS_ENABLE_TESTS=OFF
          make -j$(nproc)
      - name: Verify binary
        run: native/build/aegisd --version
      - uses: actions/upload-artifact@v4
        with:
          name: aegisd-linux-x86_64
          path: native/build/aegisd

  aegisd-bpf:
    name: Build aegisd with eBPF
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake g++ pkg-config clang llvm \
            libyaml-cpp-dev libsqlite3-dev libcurl4-openssl-dev \
            libbpf-dev libelf-dev zlib1g-dev linux-tools-common bpftool
      - name: Generate vmlinux.h
        run: |
          if [ -f /sys/kernel/btf/vmlinux ]; then
            bpftool btf dump file /sys/kernel/btf/vmlinux format c > native/vmlinux/vmlinux_x86_64.h
          else
            echo "// vmlinux.h placeholder — BTF not available in CI" > native/vmlinux/vmlinux_x86_64.h
          fi
      - name: Build aegisd with eBPF
        run: |
          cd native
          mkdir build && cd build
          cmake .. -DAEGIS_ENABLE_BPF=ON -DAEGIS_ENABLE_TESTS=OFF
          make -j$(nproc) 2>&1 || echo "eBPF build may fail in CI without kernel BTF — this is expected"

  build-wheels:
    name: Build Wheels
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build wheel
        run: |
          pip install maturin
          maturin build --release
      - uses: actions/upload-artifact@v4
        with:
          name: wheel-${{ matrix.os }}
          path: target/wheels/*.whl
