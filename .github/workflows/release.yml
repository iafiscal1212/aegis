name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-wheels:
    name: Build ${{ matrix.target }} (py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          # Linux x86_64
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            python-version: "3.11"
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            python-version: "3.12"
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            python-version: "3.13"
          # Linux aarch64
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            python-version: "3.11"
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            python-version: "3.12"
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            python-version: "3.13"
          # macOS x86_64
          - os: macos-13
            target: x86_64-apple-darwin
            python-version: "3.11"
          - os: macos-13
            target: x86_64-apple-darwin
            python-version: "3.12"
          - os: macos-13
            target: x86_64-apple-darwin
            python-version: "3.13"
          # macOS aarch64
          - os: macos-latest
            target: aarch64-apple-darwin
            python-version: "3.11"
          - os: macos-latest
            target: aarch64-apple-darwin
            python-version: "3.12"
          - os: macos-latest
            target: aarch64-apple-darwin
            python-version: "3.13"
          # Windows x86_64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            python-version: "3.11"
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            python-version: "3.12"
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            python-version: "3.13"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install cross-compilation tools (aarch64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
      - name: Build wheel
        run: |
          pip install maturin
          maturin build --release --target ${{ matrix.target }} -i python${{ matrix.python-version }}
      - uses: actions/upload-artifact@v4
        with:
          name: wheel-${{ matrix.target }}-py${{ matrix.python-version }}
          path: target/wheels/*.whl

  build-sdist:
    name: Build sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build sdist
        run: |
          pip install maturin
          maturin sdist
      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: target/wheels/*.tar.gz

  publish:
    name: Publish to PyPI
    needs: [build-wheels, build-sdist]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Publish
        env:
          MATURIN_PYPI_TOKEN: ${{ secrets.PYPI_TOKEN }}
        run: |
          pip install maturin
          maturin upload dist/*
